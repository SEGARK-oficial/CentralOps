name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: [self-hosted, Linux, X64]
    # Expõe os outputs do release-please para o job de build condicional abaixo.
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create Release PR or GitHub Release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Quando o release-please CRIA um release (tag vX.Y.Z), constrói e publica a
  # imagem com a TAG DA VERSÃO. Necessário porque a tag criada pelo
  # release-please usa o GITHUB_TOKEN padrão, e o GitHub NÃO dispara workflows a
  # partir de eventos gerados pelo GITHUB_TOKEN (proteção anti-recursão) — então
  # o gatilho `on: push: tags: [v*]` do build-and-publish.yml nunca disparava
  # para releases automáticos, e só a tag `latest` (do push em main) era
  # publicada. Construir aqui, no mesmo run, fecha esse gap sem exigir um PAT.
  build-release-image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout no tag do release
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # tag_name = vX.Y.Z. Geramos a tag exata da versão + as rolling tags
          # vX e vX.Y (convenção comum). value= sobrescreve o ref git (o run é
          # disparado por push em main, não pela tag). metadata-action também
          # normaliza o nome da imagem para lowercase (requisito do GHCR).
          tags: |
            type=semver,pattern=v{{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern=v{{major}},value=${{ needs.release-please.outputs.tag_name }}

      - name: Build and push Docker image (versão)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compose/Dockerfile
          target: final
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
