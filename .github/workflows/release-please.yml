name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Expõe os outputs do release-please para o job de build condicional abaixo.
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create Release PR or GitHub Release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Quando o release-please CRIA um release (tag vX.Y.Z), constrói e publica a
  # imagem com a TAG DA VERSÃO. Necessário porque a tag criada pelo
  # release-please usa o GITHUB_TOKEN padrão, e o GitHub NÃO dispara workflows a
  # partir de eventos gerados pelo GITHUB_TOKEN (proteção anti-recursão) — então
  # o gatilho `on: push: tags: [v*]` do build-and-publish.yml nunca disparava
  # para releases automáticos, e só a tag `latest` (do push em main) era
  # publicada. Construir aqui, no mesmo run, fecha esse gap sem exigir um PAT.
  build-release-image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # OIDC p/ assinatura keyless (cosign)
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    # A imagem foi dividida em DUAS — `final` (API/uvicorn) e `frontend`
    # (nginx + SPA). O matrix publica AS DUAS com as tags versionadas. Antes só a
    # `final` era buildada aqui → num release automático o frontend NUNCA ganhava
    # a tag vX.Y.Z (o build-and-publish.yml, que faz as duas via matrix, não
    # dispara para tags criadas pelo GITHUB_TOKEN do release-please — anti-recursão
    # do Actions). Sem esta matrix, `centralops-frontend:vX.Y.Z` ficava faltando.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: final
            suffix: ""
          - target: frontend
            suffix: "-frontend"
    steps:
      - name: Checkout no tag do release
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR exige o nome em MINÚSCULAS; github.repository preserva o case. Calcula
      # o ref base (com o suffix do target) uma vez e reusa em meta/cosign.
      - name: Compute lowercase image ref
        id: img
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          name="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "ref=${REGISTRY}/${name}${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.ref }}
          # tag_name = vX.Y.Z. Tag exata da versão + rolling vX e vX.Y. value=
          # sobrescreve o ref git (o run é disparado por push em main, não pela tag).
          tags: |
            type=semver,pattern=v{{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern=v{{major}},value=${{ needs.release-please.outputs.tag_name }}

      - name: Build and push Docker image (${{ matrix.target }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compose/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          # SBOM + provenance SLSA anexados (atestações OCI) — paridade com
          # build-and-publish.yml (procurement enterprise/MSSP exige proveniência).
          sbom: true
          provenance: mode=max

      # Assinatura keyless (Sigstore/Fulcio/Rekor) por DIGEST — paridade com o
      # build-and-publish.yml. Verificável com `cosign verify <ref>@<digest>`.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        shell: bash
        run: cosign sign --yes "${{ steps.img.outputs.ref }}@${{ steps.build.outputs.digest }}"
