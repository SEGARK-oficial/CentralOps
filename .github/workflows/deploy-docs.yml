# Build the Docusaurus site and publish it to this repository's GitHub Pages.
#
# CentralOps is public, so Pages is free and publishes directly from this repo —
# no separate docs repo and no PAT required. One-time setup (repo admin):
#   Settings > Pages > Source: "Deploy from a branch" > Branch: gh-pages / (root).
# Published URL: https://docs.segark.com/
# (baseUrl in docs-site/docusaurus.config.ts must match: "/CentralOps/".)

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: false

permissions:
  contents: write # peaceiris pushes the built site to the gh-pages branch

jobs:
  build-and-publish:
    name: Build and publish docs to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build static site
        working-directory: docs-site
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs-site/build
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
