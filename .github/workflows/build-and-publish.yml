name: Build & Publish Docker Image

# SÓ RELEASES (tags v*). O publish de push/main migrou p/ o job 'publish' do
# ci.yml (gate completo build+pg+e2e, promove a imagem JÁ testada sem recompilar).
# Aqui ficou o caminho de RELEASE versionado (com toda a supply-chain).
on:
  push:
    tags:
      - "v*"
  # Botão manual: (re)builda + publica AS DUAS imagens (final + frontend) de uma
  # tag de release JÁ existente, com toda a supply-chain (SBOM + cosign + Trivy).
  # Útil quando o publish automático de um release não gerou tudo (ex.: a tag foi
  # criada pelo GITHUB_TOKEN do release-please → este workflow, que dispara em
  # `push: tags`, não roda; e o job próprio do release-please só buildava a API).
  # NÃO mexe na tag/release — só (re)publica as imagens no digest do tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de release para (re)buildar+publicar (ex.: v2.0.0)"
        required: true
        type: string

# Cancela builds obsoletos do MESMO ref num burst de merges. Em TAGS de release e
# no workflow_dispatch o cancel é FALSE: a imagem versionada NUNCA é cancelada no
# meio do publish (também construída por release-please.yml em job próprio).
concurrency:
  group: build-publish-${{ inputs.tag || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' && github.ref_type == 'branch' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write       # OIDC p/ assinatura keyless (cosign)

    # SUPPLY-CHAIN: todas as Actions são pinadas por COMMIT SHA (não por tag
    # flutuante @vN), com o comentário `# vX.Y.Z` documentando a versão legível.
    # Este job tem `packages: write` + `id-token: write` (assina imagem de release
    # com a identidade OIDC do repo) — uma tag comprometida a montante poderia
    # publicar/assinar imagem maliciosa. O SHA remove esse vetor. Ao bumpar uma
    # Action, troque o SHA E o comentário juntos (ambos apontam p/ o mesmo release).

    # a imagem foi dividida em DUAS — `final` (API/uvicorn) e
    # `frontend` (nginx + SPA). O matrix publica as duas com a mesma esteira de
    # supply-chain (SBOM + provenance + cosign + Trivy). Imagens OCI genéricas:
    # servem qualquer runtime (docker puro, Portainer, k8s) — não há acoplamento
    # a um orquestrador específico.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: final
            suffix: ""
          - target: frontend
            suffix: "-frontend"

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Na dispatch, faz checkout do TAG informado; no push de tag, o ref já é a tag.
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI/GHCR exigem o nome do repositório em MINÚSCULAS, mas
      # github.repository preserva o case original (ex.: SEGARK-oficial/CentralOps).
      # Calcula o ref base minúsculo UMA vez e reusa em meta/cosign/Trivy — senão
      # os passos que montam o ref na mão (cosign/Trivy) falham com
      # "repository name must be lowercase".
      - name: Compute lowercase image ref
        id: img
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          SUFFIX: ${{ matrix.suffix }}
        # `tr` em vez de `${VAR,,}` (bash 4+): portável p/ qualquer shell POSIX.
        run: |
          name="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "ref=${REGISTRY}/${name}${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ steps.img.outputs.ref }}
          # value= vale para os dois gatilhos: no push de tag, github.ref_name já é a
          # tag (ex.: v2.0.0); na dispatch, é o inputs.tag. Emite vX.Y.Z + rolling
          # vX.Y e vX (paridade com release-please.yml). `sha-` só no push de tag
          # (na dispatch o github.sha seria o do ref de disparo, não o do tag).
          tags: |
            type=semver,pattern=v{{version}},value=${{ inputs.tag || github.ref_name }},enable=${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ inputs.tag || github.ref_name }},enable=${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
            type=semver,pattern=v{{major}},value=${{ inputs.tag || github.ref_name }},enable=${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == github.event.repository.default_branch }}
            type=sha,prefix=sha-,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push Docker image (${{ matrix.target }})
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: compose/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          # SBOM + provenance SLSA anexados à imagem (atestações
          # OCI). Procurement enterprise/MSSP exige proveniência verificável.
          sbom: true
          provenance: mode=max

      # assinatura keyless (Sigstore/Fulcio/Rekor) por DIGEST.
      # Verificável com `cosign verify <ref>@<digest> \
      #   --certificate-identity-regexp '.*' \
      #   --certificate-oidc-issuer https://token.actions.githubusercontent.com`.
      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign image (keyless)
        shell: bash
        run: cosign sign --yes "${{ steps.img.outputs.ref }}@${{ steps.build.outputs.digest }}"

      # scan de vulnerabilidades da IMAGEM (não só deps — isso já é
      # feito por pip-audit em security.yml). Saída em TABELA no log do job
      # (report-only: exit-code 0 → não bloqueia o publish). NÃO enviamos o SARIF
      # pro Security tab: code scanning em repo PRIVADO exige GitHub Advanced
      # Security; sem GHAS o upload falha com "Resource not accessible by
      # integration". Para bloquear em CVE, troque exit-code p/ '1'. Com GHAS,
      # volte format=sarif + um passo github/codeql-action/upload-sarif
      # (requer permissão security-events: write).
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.ref }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # GATE: release com CRITICAL/HIGH fixável FALHA o job (era '0'/report-only).
          # Nota: roda APÓS o push (build-push-action é atômico); a tag de release
          # fica publicada mas o job vermelho sinaliza/bloqueia a promoção do deploy.
          exit-code: '1'
