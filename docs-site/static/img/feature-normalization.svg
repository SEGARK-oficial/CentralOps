<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="200" height="130" role="img" aria-labelledby="fv2t">
  <title id="fv2t">Events of mixed shapes becoming one uniform shape</title>
  <!-- Normalization: on the left every vendor has its own shape and size; past
       the gate every event is the same square. That is the whole point of
       mapping to OCSF, and it is why one rule can match every vendor after it. -->
  <g fill="var(--seg-collect,#F2A83C)">
    <circle cx="20" cy="24" r="9"/>
    <rect x="42" y="44" width="21" height="13" rx="2.5"/>
    <circle cx="22" cy="70" r="6"/>
    <path d="M46 84 l11 19 -22 0 z"/>
    <rect x="12" y="98" width="15" height="15" rx="2.5"/>
    <circle cx="52" cy="20" r="5"/>
  </g>

  <rect x="86" y="20" width="11" height="90" rx="5.5" fill="var(--seg-normalize,#7C6BEA)"/>

  <!-- One shape, one size, evenly pitched — order imposed. -->
  <g fill="var(--seg-route,#3BA9CC)">
    <rect x="122" y="26" width="13" height="13" rx="3"/>
    <rect x="152" y="26" width="13" height="13" rx="3"/>
    <rect x="122" y="52" width="13" height="13" rx="3"/>
    <rect x="152" y="52" width="13" height="13" rx="3"/>
    <rect x="122" y="78" width="13" height="13" rx="3"/>
    <rect x="152" y="78" width="13" height="13" rx="3"/>
  </g>
  <g stroke="var(--seg-route,#3BA9CC)" stroke-opacity=".3" stroke-width="1.5">
    <line x1="118" y1="104" x2="169" y2="104"/>
  </g>
</svg>
