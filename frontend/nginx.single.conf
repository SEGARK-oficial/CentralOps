server {
    # nginx-unprivileged (non-root) escuta em porta alta (8080).
    # Host mapeia 3000 → 8080 no compose.
    listen 8080;
    server_name ${NGINX_SERVER_NAME};
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

    # Hide nginx version
    server_tokens off;

    # API proxy configuration
    location /api/ {
        # a API virou serviço separado (uvicorn), não mais loopback
        # no mesmo container. ${API_UPSTREAM} é injetado pelo start-frontend.sh
        # via envsubst (default centralops:8000).
        proxy_pass http://${API_UPSTREAM};
        # $http_host (inclui a porta), não $host (sem porta): o FastAPI usa o
        # header Host para montar o Location de redirects de trailing-slash
        # (ex.: GET /api/organizations -> 307 /api/organizations/). Com $host o
        # Location perde a porta (http://localhost/...) e clientes fora do
        # browser (seed/Playwright) caem em ECONNREFUSED ao seguir o redirect.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Security
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Server $host;
    }

    # Block FastAPI docs at the edge by default.
    # If you need controlled access, replace "return 404" with "allow <IP/CIDR>; deny all;".
    location = /docs {
        return 404;
    }

    location ^~ /docs/ {
        return 404;
    }

    location = /redoc {
        return 404;
    }

    location ^~ /redoc/ {
        return 404;
    }

    location = /openapi.json {
        return 404;
    }

    # Frontend static files with aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";

        # CORS for fonts and assets
        add_header Access-Control-Allow-Origin "*";

        # Gzip compression
        gzip_static on;
    }

    # Main frontend route (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers for HTML
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # Cache control for HTML files
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to backup and config files
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting (if needed, uncomment and configure)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # location /api/ {
    # limit_req zone=api burst=20 nodelay;
    # }
}
