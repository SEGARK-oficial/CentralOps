[pytest]
asyncio_mode = auto
testpaths = app/collectors/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    source_only: test requires .py source files on disk (skipped when running against Cython-compiled image)
    pg: test requires a real PostgreSQL (PG_TEST_DSN or testcontainers); skipped on SQLite. Validates DDL/migrations that SQLite's loose typing masks.
