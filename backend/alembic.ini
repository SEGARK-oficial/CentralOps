# Alembic config
# Em runtime, database._alembic_config() constrói o Config programaticamente
# (script_location absoluto a partir do __file__ + sqlalchemy.url do DATABASE_URL),
# então este arquivo é só p/ conveniência do desenvolvedor na linha de comando.
#
# Uso (do diretório backend/, com o venv ativo):
# DATABASE_URL=sqlite:////tmp/dev.db alembic revision --autogenerate -m "msg"
# DATABASE_URL=postgresql+psycopg2://... alembic history

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
# sqlalchemy.url é injetado pelo env.py (lê DATABASE_URL do ambiente/config).
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
