# Fluent Bit — edge-collector para Windows Event Log via WEC/WEF .
#
# Roda no SERVIDOR COLETOR (Windows Event Collector) que recebe os eventos
# encaminhados (Windows Event Forwarding). O input `winevtlog` lê os canais e o
# output `http` encaminha NDJSON autenticado ao endpoint de ingestão do CentralOps.
#
# Pré-requisitos (no Windows Collector):
# - WEF/WEC configurado: GPO "Event Forwarding" → subscrição → canal ForwardedEvents.
# - Fluent Bit instalado como serviço do Windows.
#
# Substitua __CENTRALOPS_URL__ e __INGEST_TOKEN__ (ou use variáveis de ambiente
# ${...} se sua versão do Fluent Bit suportar expansão).

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    storage.path  C:\\fluent-bit\\buffer
    storage.sync  normal

[INPUT]
    Name              winevtlog
    Channels          ForwardedEvents,Security
    Interval_Sec      1
    DB                C:\\fluent-bit\\winevtlog.sqlite
    Read_Existing_Events False
    Tag               win.events

# O tempo do evento sai no campo ``TimeCreated`` em ISO-8601 via ``json_date_key``
# abaixo (o timestamp do registro winevtlog = TimeCreated do evento). O mapping
# (windows_event_log_security.json) lê ``TimeCreated``. Não há filtro de timestamp
# manual — ``${TIMESTAMP_ISO}`` não é variável do Fluent Bit e não expandiria.

[OUTPUT]
    Name              http
    Match             win.events
    Host              __CENTRALOPS_HOST__
    Port              443
    URI               /api/ingest/security
    TLS               On
    Format            json_lines
    Header            Authorization Bearer __INGEST_TOKEN__
    json_date_key     TimeCreated
    json_date_format  iso8601
    Retry_Limit       10
    # storage.total_limit_size protege a memória/disco da borda (backpressure).
    storage.total_limit_size 256M
