# Enterprise overlay . Run ON TOP of the Community compose:
# docker compose -f compose/docker-compose.yml -f compose/docker-compose.ee.yml up -d
#
# It changes ONLY what differs for the Enterprise edition; postgres/redis/redpanda/
# flower, networks, volumes, depends_on, healthchecks and base env are inherited.
# - swaps the API + workers + beat to the EE backend image (centralops-ee), and the
# SPA to the EE frontend image (centralops-web-ee);
# - swaps the Celery app to centralops_ee.celery_app so the EE task modules
# (federated-query run/poll) + the scope-resolver/quota seams register on the worker
# (start-collector.sh execs the command verbatim — cops-celery is only for `exec`);
# - injects the offline license token (CENTRALOPS_LICENSE_TOKEN) + mounts the PUBLIC
# keyring read-only at /licensing (CENTRALOPS_LICENSE_KEYS_DIR). No private key, no
# image rebake — flip CE<->EE just by adding/removing this -f overlay.
#
# Env (set in compose/.env or the shell):
# CENTRALOPS_LICENSE_TOKEN  — the signed EdDSA JWT (billing_plane.cli issue)
# LICENSE_KEYS_DIR          — host dir holding <kid>.pem (public only)
# CENTRALOPS_EE_IMAGE       — EE backend image ref (default centralops-ee:latest,
#                             o build local; aponte p/ ghcr.io/segark-oficial/centralops-ee:<tag>
#                             para rodar a imagem publicada sem retag)
# CENTRALOPS_WEB_EE_IMAGE   — EE frontend image ref (default centralops-web-ee:latest;
#                             publicada: ghcr.io/segark-oficial/centralops-ee-frontend:<tag>)

x-ee-license-env: &ee-license-env
  - CENTRALOPS_LICENSE_TOKEN=${CENTRALOPS_LICENSE_TOKEN:-}
  - CENTRALOPS_LICENSE_KEYS_DIR=/licensing

x-ee-keyring-vol: &ee-keyring-vol
  # Host dir holding the PUBLIC keyring (<kid>.pem). Set LICENSE_KEYS_DIR in compose/.env
  # to the dir produced by `billing_plane.cli keygen` (public key only — never the private).
  - ${LICENSE_KEYS_DIR:-./dev-license-keys}:/licensing:ro

services:
  # ── API: EE image (activate_enterprise mounts EE routers + registers seams) ──
  centralops:
    image: ${CENTRALOPS_EE_IMAGE:-centralops-ee:latest}
    environment: *ee-license-env
    volumes: *ee-keyring-vol

  # ── SPA: EE bundle (federated-search screens + partner panel) ──
  frontend:
    image: ${CENTRALOPS_WEB_EE_IMAGE:-centralops-web-ee:latest}

  # ── Celery workers + beat: EE image + centralops_ee.celery_app ──
  collector-worker-priority:
    image: ${CENTRALOPS_EE_IMAGE:-centralops-ee:latest}
    command: [celery, -A, centralops_ee.celery_app, worker, -Q, collect.priority, -n, priority@%h, --concurrency=4, --loglevel=info]
    environment: *ee-license-env
    volumes: *ee-keyring-vol

  collector-worker-bulk:
    image: ${CENTRALOPS_EE_IMAGE:-centralops-ee:latest}
    command: [celery, -A, centralops_ee.celery_app, worker, -Q, "collect.bulk,collect.backfill", -n, bulk@%h, --concurrency=8, --loglevel=info]
    environment: *ee-license-env
    volumes: *ee-keyring-vol

  collector-worker-maintenance:
    image: ${CENTRALOPS_EE_IMAGE:-centralops-ee:latest}
    command: [celery, -A, centralops_ee.celery_app, worker, -Q, "maintenance,maintenance.high", -n, maintenance@%h, --concurrency=4, --loglevel=info]
    environment: *ee-license-env
    volumes: *ee-keyring-vol

  collector-worker-query:
    image: ${CENTRALOPS_EE_IMAGE:-centralops-ee:latest}
    command: [celery, -A, centralops_ee.celery_app, worker, -Q, collect.query, -n, query@%h, --concurrency=4, --loglevel=info]
    environment: *ee-license-env
    volumes: *ee-keyring-vol

  collector-dispatcher:
    image: ${CENTRALOPS_EE_IMAGE:-centralops-ee:latest}
    command: [celery, -A, centralops_ee.celery_app, worker, -Q, "dispatch.dlq,dispatch.destination,dispatch.destination.0,dispatch.destination.1,dispatch.destination.2,dispatch.destination.3,dispatch.destination.4,dispatch.destination.5,dispatch.destination.6,dispatch.destination.7", -n, dispatch@%h, --concurrency=8, --loglevel=info]
    environment: *ee-license-env
    volumes: *ee-keyring-vol

  collector-beat:
    image: ${CENTRALOPS_EE_IMAGE:-centralops-ee:latest}
    command: [celery, -A, centralops_ee.celery_app, beat, --loglevel=info]
    environment: *ee-license-env
    volumes: *ee-keyring-vol

  # ── Kafka data-plane dispatcher: EE image for edition consistency; command unchanged
  # (it runs the Core dataplane dispatcher, not a Celery -A worker) ──
  collector-kafka-dispatcher:
    image: ${CENTRALOPS_EE_IMAGE:-centralops-ee:latest}
    environment: *ee-license-env
    volumes: *ee-keyring-vol
