# Provisionamento dos dashboards versionados do CentralOps (auto-load no boot).
apiVersion: 1
providers:
  - name: centralops
    orgId: 1
    folder: CentralOps
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/centralops
      foldersFromFilesStructure: false
