# Default values for centralops.
# This is a YAML-formatted file.

# nameOverride / fullnameOverride permitem renomear os recursos sem mexer no chart.
nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/segark-oficial/centralops
  pullPolicy: IfNotPresent
  # Prefira PINAR por digest imutável em produção (reprodutível, rollback seguro):
  # digest: "sha256:<...>"
  # Se `digest` estiver vazio, cai na `tag`. Evite `latest` em produção.
  tag: ""
  digest: ""

frontendImage:
  repository: ghcr.io/segark-oficial/centralops-frontend
  pullPolicy: IfNotPresent
  tag: ""
  digest: ""

imagePullSecrets:
  - name: ghcr-secret

# ServiceAccount dedicado (least-privilege). Não monta o token da API do k8s —
# nenhum workload precisa falar com o api-server.
serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

config:
  domain: ""
  appEnv: "production"
  otelEnabled: "true"
  # Endpoint OTLP BASE — aponte para o OTel COLLECTOR gateway (fan-out p/
  # Prometheus/Loki/Tempo); a app anexa /v1/{metrics,logs,traces}. Ex.:
  # "http://192.168.3.108:4318". NÃO aponte direto pro Prometheus (só aceita
  # métricas → traces/logs dariam 404). Vazio = OTel efetivamente desligado.
  # Ver compose/observability/ p/ o stack do Collector pronto.
  otelExporterOtlpEndpoint: ""
  # Sampler de traces (0..1). 0 = sem export de traces (mantém métricas) — use
  # quando não há backend de traces. 1 = head 1.0 (o tail-sampling decide no
  # Collector); só use 1 com Collector+Tempo no ar.
  otelTracesSamplerRatio: "0"
  # Logs OTel → Collector → Loki (toggle separado; volume alto). Ligue ("true")
  # quando o Collector estiver no ar.
  otelLogsEnabled: "false"
  nginxServerName: "centralops.local"
  # CORS — restrinja às origens reais em produção (evite "*").
  corsOrigins: ""
  sessionSecureCookie: "1"
  # 150s = 5x o beat_max_loop_interval (30s), casando a intenção do core
  # (config.py:REDBEAT_LOCK_TIMEOUT=150). NÃO usar 600: prolonga a espera de
  # re-aquisição do lock após kill-duro do beat (coleta parada por até 10min).
  # NÃO baixar de ~90s (romperia a invariante max_loop < lock_timeout, que o
  # celery_app agora VALIDA no boot com fail-fast no processo beat).
  redbeatLockTimeout: "150"
  # TLS do frontend: "1" termina TLS no nginx (precisa de cert), "0" serve HTTP
  # e o TLS termina no Ingress. Default 0 = TLS na borda (Ingress).
  enableHttps: "0"
  # ── Privacidade / redução de custo / drift ──────────────────────────────
  # Redação de PII na entrega. "true" (default) aplica a spec de PII da rota
  # ANTES do evento sair para o destino. "false" NÃO é um "modo de teste" e NÃO
  # entrega em claro: é FAIL-CLOSED e o estrago é de ROTEAMENTO. Basta UMA rota
  # da organização ter spec de PII para a compilação da lista inteira de rotas
  # daquela org falhar — e TODO o tráfego dela passa a cair no destino marcado
  # como padrão (ou em DLQ/quarentena, se não houver nenhum). Silencioso: não há
  # aviso na UI. Antes de desligar, audite quais rotas têm spec de redação.
  piiRedactionEnabled: "true"
  # Medição de volume (bytes que ENTRAM por fonte vs bytes que SAEM por destino).
  # É o que alimenta os cards Coletado/Entregue/Evitado/Redução em "Fluxo de
  # dados". INTERRUPTOR-MESTRE: com "false", TODA flag reduction* abaixo vira
  # no-op mesmo marcada "true" ("não se reduz sem medir"). Fail-open — Redis
  # fora do ar nunca derruba coleta nem entrega, só zera o card.
  costMeteringEnabled: "true"
  # ── As quatro alavancas de redução ──
  # ANTES DE MEXER: ligar qualquer uma destas NÃO descarta um byte. Quem decide é
  # o default POR ROTA — `sample_percent` nasce 100 (mantém tudo) e
  # `suppress_allow` nasce 0 (desligada) — e rota com `protect_detection` (o
  # default de TODA rota) nunca é amostrada, suprimida nem agregada. Estas flags
  # só dizem se a configuração feita na rota tem permissão de valer.
  #
  # Trimming: NÃO liga o corte (os limites de tamanho por campo cortam de
  # qualquer jeito) — liga a CONTABILIZAÇÃO do que foi cortado. Com "false" o
  # produto corta bytes e mostra Evitado/Redução em zero, escondendo economia
  # real. Não muda um byte do que é entregue.
  reductionTrimEnabled: "true"
  # Amostragem estatística (hash consistente por evento — o mesmo evento cai
  # sempre do mesmo lado). Inerte enquanto nenhuma rota tiver `sample_percent`
  # abaixo de 100.
  reductionSampleEnabled: "true"
  # Supressão de assinatura repetida. Kill-switch de ambiente para quando uma
  # chave de supressão mal configurada estiver engolindo tráfego (a supressão
  # roda ANTES do roteamento e não aparece nos contadores da rota).
  # ATENÇÃO ao alcance real neste chart: a chave chega ao processo por
  # envFrom/ConfigMap, e não há checksum/config nem reloader nos templates — ou
  # seja, `helm upgrade` sozinho NÃO surte efeito, é preciso
  # `kubectl rollout restart` de api e workers. A lista de rotas, ao contrário,
  # é relida do banco a cada ciclo: zerar `suppress_allow` na rota culpada
  # costuma estancar mais rápido do que virar esta flag.
  # Fail-open: erro de Redis entrega o evento.
  reductionSuppressEnabled: "true"
  # Fail-safe de detecção, override GLOBAL — de ALCANCE ESTREITO, apesar do nome.
  # Só alcança a AMOSTRAGEM: é lida uma única vez, para montar o SamplingConfig.
  # "false" volta a permitir amostrar rotas protegidas. NÃO libera supressão nem
  # descarte do bruto: esses dois olham direto a coluna `protect_detection` da
  # rota e seguem bloqueados com esta flag em "false". A agregação não consulta
  # `protect_detection` em ponto nenhum — é opt-in por DESTINO (aggregate.group_by).
  reductionSampleProtectDetection: "true"
  # ÚNICA que nasce "false", de propósito. Agregação colapsa log→métrica: o
  # evento individual DEIXA DE EXISTIR na entrega — não há o que investigar no
  # destino depois. As outras três descartam ou encurtam, mas o que sobra ainda
  # é um evento. Ligar é decisão consciente por ambiente, nunca default.
  reductionAggregateEnabled: "false"
  # ── Drift (campo que o vendor manda e o mapping ainda não cobre) ──
  # O que a coluna de amostra do "Drift Explorer" guarda. Aceita SOMENTE
  # masked | raw | none — QUALQUER outro valor FAZ O BOOT FALHAR no validador do
  # core (inclusive no meio de um rolling update; o pod novo não sobe).
  #   masked (default): grava um classificador de formato (<ipv4>, <email>,
  #     <uuid>) no lugar do valor — quem escreve mapping vê de que TIPO é o
  #     campo sem que dado de cliente seja persistido.
  #   raw: grava o valor truncado (usuário, host, IP, caminho) numa tabela que o
  #     perfil Visualizador lê, por até 90 dias — a retenção de drift padrão,
  #     ajustável por organização via API (PATCH /api/organizations/{id}/retention).
  #     E `last_seen` é reescrito a cada ocorrência, então campo recorrente
  #     NUNCA expira: na prática o valor fica enquanto o campo continuar chegando.
  #   none: não guarda amostra (o campo ainda aparece; o exemplo dele, não).
  driftSampleValueMode: "masked"
  # Fração de eventos inspecionados EM REGIME (0.1 = 1 a cada 10). "0" NÃO
  # desliga a detecção sozinho: a janela de aprendizado abaixo é avaliada ANTES
  # da amostragem e continua capturando 100% dos primeiros N eventos de cada
  # combinação. Para parar de fato de gravar drift, zere as DUAS.
  driftSampleRate: "0.1"
  # Janela de aprendizado: os primeiros N eventos de uma combinação NOVA
  # (organização, vendor, tipo) são inspecionados a 100%, ignorando
  # driftSampleRate. É o que faz uma fonte recém-apontada aparecer com o schema
  # inteiro em minutos, em vez de gotejar 1 campo a cada 10 eventos. "0" desliga
  # o impulso e a fonte nova passa a gotejar.
  # A contagem é POR PROCESSO e vive em memória: cada restart de pod e cada
  # worker novo reabre a janela dos N eventos. Some com driftSampleRate: "0" e
  # o resultado é continuar gravando drift depois de todo rollout.
  driftLearningEvents: "200"
  # ── Edição/licença  — tuning OPCIONAL, só p/ deploy EE ──
  # Vazio = usa os defaults do core (refresh 300s de re-resolução da edição em
  # runtime; grace 7d após expirar). Sobrescreva só se quiser afinar. Ver
  # values.ee.yaml (overlay Enterprise) e o runbook de upgrade CE→EE.
  editionRefreshSeconds: ""
  licenseGraceDays: ""

secrets:
  # Em produção, gerencie estes valores FORA do values.yaml (ExternalSecrets,
  # HashiCorp Vault, SOPS) e referencie via `existingSecret`. Os defaults abaixo
  # são placeholders propositalmente inválidos/vazios — o boot falha-rápido se
  # não forem sobrescritos (ex.: APP_MASTER_KEY < 32 chars aborta o entrypoint).
  existingSecret: ""
  appMasterKey: "CHANGE_ME_TO_A_32_CHARS_MINIMUM_SECRET_KEY"
  databaseUrl: "postgresql+psycopg2://user:CHANGE_ME@postgres.centralops.svc.cluster.local:5432/db"
  redisPassword: "CHANGE_ME"
  # redisUrl → cache/dedup (volatile-lru). broker+result → redis-control
  # (noeviction) p/ o LOCK do RedBeat (que TEM TTL) NUNCA ser evictável. Em PROD
  # gerenciado, aponte broker/result p/ um cluster/endpoint noeviction+HA SEPARADO
  # do cache. O RedBeat (schedule+lock) segue o broker automaticamente.
  redisUrl: "redis://:CHANGE_ME@redis.centralops.svc.cluster.local:6379/0"
  celeryBrokerUrl: "redis://:CHANGE_ME@redis-control.centralops.svc.cluster.local:6379/1"
  celeryResultBackend: "redis://:CHANGE_ME@redis-control.centralops.svc.cluster.local:6379/2"
  # Flower (UI Celery) — deixe vazio para desabilitar basic-auth fraco.
  flowerBasicAuth: ""
  # Licença Enterprise . Vazio = Community (default). Um token
  # EdDSA válido + a IMAGEM EE (values.ee.yaml) → flip para Enterprise em runtime.
  # Edition-neutro: a Community ignora o token (não há código EE para ativar).
  # Em produção, injete via ExistingSecret/ExternalSecrets/Vault — não versione o token.
  licenseToken: ""
  # Keyring PÚBLICO Enterprise  — os <kid>.pem da chave PÚBLICA do
  # billing-plane que verificam a assinatura EdDSA do token OFFLINE. OBRIGATÓRIO
  # para o flip Enterprise: SEM o keyring, um token válido não pode ser verificado
  # e edition.current() fail-close para Community (mesmo na imagem EE). SÓ chaves
  # PÚBLICAS aqui — a privada NUNCA sai do billing-plane (por isso um ConfigMap
  # basta; não é segredo). Mapa <arquivo.pem> → conteúdo PEM. Ex.:
  # licenseKeyring:
  # "billing-2026.pem": |
  # -----BEGIN PUBLIC KEY-----
  # ...
  # -----END PUBLIC KEY-----
  # No deploy, prefira `--set-file secrets.licenseKeyring.<arquivo\.pem>=./chave.pem`
  # (mantém o PEM fora do values versionado) ou `existingLicenseKeyring`.
  licenseKeyring: {}
  # Alternativa GitOps/ExternalSecrets ao inline acima: nome de um ConfigMap
  # PRÉ-EXISTENTE contendo os <kid>.pem. Tem precedência sobre `licenseKeyring`.
  existingLicenseKeyring: ""

# ── SecurityContext (Pod Security Standards: restricted) ────────────────────
# Aplicado a TODOS os workloads via _helpers. backend roda uid 10001
# (Dockerfile `USER 10001`); nginx-unprivileged roda uid 101 (`USER 101`).
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

api:
  replicaCount: 2
  runAsUser: 10001
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: PROIBIDO (death-spiral; ver workers)
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "256Mi"
  probes:
    startup:
      path: /readyz
      failureThreshold: 30
      periodSeconds: 5
    readiness:
      path: /readyz
      periodSeconds: 10
      timeoutSeconds: 3
    liveness:
      path: /livez
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3

frontend:
  replicaCount: 2
  runAsUser: 101
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: PROIBIDO (death-spiral; ver workers)
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    limits:
      cpu: "200m"
      memory: "128Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"
  service:
    type: ClusterIP
    port: 8080
  probes:
    readiness:
      path: /health
      periodSeconds: 10
      timeoutSeconds: 3
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 20

workers:
  priority:
    replicaCount: 1
  bulk:
    replicaCount: 1
  maintenance:
    replicaCount: 1
  dispatcher:
    replicaCount: 1
    # Dispatcher é o worker MAIS PESADO (carrega libs de sink dos destinos —
    # S3/Sentinel/Kafka — por fork) → ~554Mi a concurrency=2 (OOMKilled em 640Mi).
    # Override de resources (medido 2026-06-25).
    resources:
      limits:
        cpu: "1000m"
        memory: "1Gi"
      requests:
        cpu: "150m"
        memory: "512Mi"
  # beat DEVE permanecer singleton (o lock RedBeat protege, mas mantenha 1).
  # replicaCount>1 ou autoscaling p/ o beat FALHAM o `helm template` (guard em
  # workers-deployment.yaml) — 2 beats disputam o lock → LockNotOwnedError.
  beat:
    replicaCount: 1
    # beat só AGENDA (não faz fork de tarefa) → uso ~98Mi. Override enxuto.
    resources:
      limits:
        # SEM cpu limit de propósito: o beat é loop single-thread e um teto
        # apertado causa throttling CFS que atrasa a renovação do lock (→
        # LockNotOwnedError). Mantém-se o memory limit (guard de OOM real). Se a
        # política do cluster EXIGIR limits (LimitRange), use cpu:"1000m".
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    # Liveness por HEARTBEAT (o beat não responde a `celery inspect ping`): o
    # ResilientRedBeatScheduler grava /tmp/beat-heartbeat a cada tick — mtime velho
    # ⇒ travado ⇒ reinício. Ver workers-deployment.yaml.
    livenessProbe:
      enabled: true
      staleSeconds: 180          # ~6x beat_max_loop_interval (30s)
      initialDelaySeconds: 180   # > REDBEAT_LOCK_TIMEOUT(150): cobre espera de lock no boot
      periodSeconds: 60
      failureThreshold: 3        # 3×60s de staleness consecutiva antes do reinício
    # Singleton drain-safe: maxUnavailable:1 permite drain de nó (minAvailable:1
    # bloquearia o drain p/ sempre). Ver pdb.yaml.
    pdb:
      enabled: true
      maxUnavailable: 1
  runAsUser: 10001
  # Concurrency do prefork Celery. 2 é o ponto certo p/ nós pequenos (2 vCPU/4GB):
  # cada fork é um processo Python ~150-200Mi → concurrency=4 estoura 512Mi (cgroup-OOM).
  # Tarefas são I/O-bound (API de vendor) → 2 forks bastam; p/ mais vazão, escale RÉPLICAS.
  concurrency: 2
  # default autoscaling for workers (NÃO aplicado ao beat — singleton).
  # ⚠️ NUNCA escale por MEMÓRIA. O consumo é overhead FIXO dos forks (não cresce
  # com a carga) → HPA-por-memória nunca converge e entra em DEATH-SPIRAL (escala
  # até o máximo → OOM → escala mais → derruba o control-plane). Só CPU. Incidente
  # real 2026-06-25 — ver docs/deployment + chart README (Sizing).
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: PROIBIDO (ver aviso acima)
  pdb:
    enabled: false
    minAvailable: 0
  # Resources MEDIDOS: worker concurrency=2 usa ~200-232Mi → limite 640Mi com folga
  # p/ o pico dos 2 forks. (concurrency=4 exigiria ~1Gi e nós de 8GB.)
  resources:
    limits:
      cpu: "800m"
      memory: "640Mi"
    requests:
      cpu: "150m"
      memory: "384Mi"
  # Liveness via celery inspect ping (worker travado é reiniciado). Não se
  # aplica ao beat (que não responde a inspect).
  livenessProbe:
    enabled: true
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 3

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  # TLS de borda — preencha com o Secret de certificado (ou deixe o cert-manager
  # gerenciar via annotations). Sem isto, o tráfego externo é HTTP puro.
  tls: []
  # - secretName: centralops-tls
  # hosts:
  # - centralops.example.com

networkPolicies:
  enabled: true
  # Namespace do ingress controller (label kubernetes.io/metadata.name). Usado
  # para liberar SOMENTE o ingress controller a alcançar o frontend. Vazio =
  # libera de qualquer namespace (menos restrito — defina em produção).
  ingressControllerNamespace: ""
  # Egress de internet (HTTPS 443) para os coletores chamarem APIs de vendor,
  # bloqueando o range privado do cluster (anti-movimento-lateral). Desligue só
  # se o cluster roteia vendors por um egress gateway/proxy dedicado.
  allowInternetEgress: true
  # Egress allow-list adicional. DNS é sempre liberado. Acrescente CIDRs/portas
  # externas (ex.: endpoint OTLP fora do cluster) conforme necessário.
  egress:
    # CIDRs externos permitidos (ex.: coletor OTLP fora do cluster, APIs SaaS).
    extraAllowedCIDRs: []
    # - cidr: 192.168.3.0/24
    # ports:
    # - { protocol: TCP, port: 9090 }

# Banco/redis de DESENVOLVIMENTO (Postgres+Redis in-cluster). NÃO use em produção
# — use serviço gerenciado (RDS/Cloud SQL/ElastiCache) e aponte os secrets.
devDatabase:
  enabled: false
  postgres:
    image: postgres:16-alpine
    storage: 5Gi
    user: "user"
    password: "CHANGE_ME"
    db: "db"
  # Instância de CACHE/DEDUP (db0). maxmemory-policy é GLOBAL por instância → esta
  # usa volatile-lru (evicta dedup/cache frios). O broker + schedule/LOCK RedBeat +
  # result ficam no redisControl (noeviction) porque o lock TEM TTL e sob
  # volatile-lru seria evictável → crash-loop do beat. Em PROD use gerenciado.
  redis:
    image: redis:7-alpine
    storage: 2Gi
    password: "CHANGE_ME"
    maxmemory: "512mb"        # dataset máximo em RAM (evicta só chaves com TTL)
    maxmemoryPolicy: "volatile-lru"
  # Instância de CONTROL-PLANE (broker db1 + RedBeat + result db2), noeviction.
  # Dataset pequeno; NUNCA evicta (se encher, o enqueue falha visível > perder o
  # lock em silêncio). Só sobe quando devDatabase.enabled=true.
  redisControl:
    image: redis:7-alpine
    storage: 1Gi
    maxmemory: "256mb"
    maxmemoryPolicy: "noeviction"

# ── Onda 3 — data-plane durável (Kafka/Redpanda) ──────────────────────
# Transporte de evento separado do control-plane (Celery+Redis). Com
# eventDataplane=kafka, o fan-out produz no tópico ``<prefix>.deliver`` e o
# kafka-dispatcher consome. wazuh-default segue na lane Celery (worker dispatcher).
dataPlane:
  eventDataplane: "kafka"          # "kafka" (deploy) | "celery" (dev sem broker)
  kafka:
    # PROD: aponte p/ MSK/Redpanda Cloud/Confluent. DEV: use devBroker (redpanda:9092).
    bootstrapServers: "redpanda:9092"
    topicPrefix: "centralops"
    consumerGroup: "centralops-dispatcher"
    securityProtocol: "PLAINTEXT"  # SASL_SSL em broker gerenciado
    # Managed-broker egress allow-list for NetworkPolicy (prod brokers off-cluster).
    # Each entry: { cidr: <broker CIDR>, ports: [ { protocol: TCP, port: 9092 } ] }
    brokerCIDRs: []
    # Credenciais SASL (broker gerenciado SASL_SSL). Vazio = sem SASL.
    sasl:
      mechanism: ""   # PLAIN | SCRAM-SHA-256 | SCRAM-SHA-512 (empty = no SASL)
      username: ""
      password: ""    # prefer existingSecret in prod
  # Role dispatcher (consumer do tópico deliver).
  dispatcher:
    replicaCount: 1
    resources:
      limits:
        cpu: "1000m"
        memory: "1Gi"
      requests:
        cpu: "150m"
        memory: "512Mi"
    # KEDA: escala por LAG do consumer group (exige o KEDA instalado no cluster).
    # Desligado por default; ligue em prod p/ autoscaling por estágio .
    keda:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      lagThreshold: "1000"         # mensagens de lag toleradas por réplica
    # Probes do dispatcher (liveness/readiness via touch-files em /tmp; o lado
    # Python toca /tmp/dispatcher-ready após start e /tmp/dispatcher-heartbeat a
    # cada ciclo de poll). Espelha workers.livenessProbe.enabled.
    probes:
      enabled: true
    # Onda 4 (hardening) — PodDisruptionBudget do dispatcher.
    # maxUnavailable:1 permite drain de nó mesmo com replicaCount:1 (minAvailable:1
    # bloquearia o drain do único pod).
    pdb:
      enabled: false
      maxUnavailable: 1

# Broker Redpanda IN-CLUSTER — APENAS dev/test (single-node, sem HA). Em produção
# use MSK/Redpanda Cloud/Confluent e aponte dataPlane.kafka.bootstrapServers.
devBroker:
  enabled: false
  image: redpandadata/redpanda:v24.2.7
  storage: 5Gi
