{{- if .Values.devDatabase.enabled -}}
# =============================================================================
# Postgres + Redis IN-CLUSTER — APENAS DESENVOLVIMENTO/teste.
# Em produção use serviço gerenciado (RDS/Cloud SQL/ElastiCache) e aponte os
# secrets (databaseUrl/redisUrl). As credenciais aqui DEVEM casar com o bloco
# `secrets` do values.yaml para o app conectar.
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app: postgres
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.devDatabase.postgres.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate          # PVC RWO: termina o pod antigo antes de subir o novo
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: centralops
    spec:
      # NOTA: a imagem oficial do Postgres inicia como root (chown do datadir +
      # su-exec p/ postgres). Forçar runAsNonRoot/drop-caps aqui quebra o boot.
      # Como é dev-only, mantemos só o seccomp default. Em produção use serviço
      # gerenciado (não este Deployment).
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.devDatabase.postgres.image }}
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "centralops.fullname" . }}-devdb
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "centralops.fullname" . }}-devdb
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "centralops.fullname" . }}-devdb
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app: redis
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.devDatabase.redis.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app: redis
spec:
  replicas: 1
  strategy:
    type: Recreate          # PVC RWO: termina o pod antigo antes de subir o novo
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/part-of: centralops
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: {{ .Values.devDatabase.redis.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - "redis-server"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--appendonly"
            - "yes"
            # Instância de CACHE/DEDUP (db0). volatile-lru evicta a chave-com-TTL
            # menos usada. ATENÇÃO: as entries do RedBeat e do broker são sem-TTL
            # (protegidas), MAS o LOCK do RedBeat TEM TTL (REDBEAT_LOCK_TIMEOUT) →
            # seria evictável aqui. Por isso broker+RedBeat+result foram para o
            # `redis-control` (noeviction). maxmemory-policy é GLOBAL por instância.
            - "--maxmemory"
            - "{{ .Values.devDatabase.redis.maxmemory }}"
            - "--maxmemory-policy"
            - "{{ .Values.devDatabase.redis.maxmemoryPolicy | default "volatile-lru" }}"
            # auto-rewrite do AOF EXPLÍCITO (o default do redis:7 já é 100%/64mb).
            # O que REALMENTE limita o AOF é o --maxmemory acima (limita o dataset
            # vivo → limita o snapshot pós-rewrite); a AUSÊNCIA de maxmemory — não
            # a falta de rewrite — foi a causa-raiz do AOF=6GB (incidente 2026-06-25).
            - "--auto-aof-rewrite-percentage"
            - "100"
            - "--auto-aof-rewrite-min-size"
            - "64mb"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "centralops.fullname" . }}-devdb
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              # cgroup acima do maxmemory (folga p/ fork do AOF-rewrite + fragmentação)
              memory: "768Mi"
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# ── redis-control (dev): broker + schedule/LOCK RedBeat + result, noeviction ──
# SEPARADO do `redis` de cache porque a policy de eviction é GLOBAL por instância:
# o lock do RedBeat TEM TTL e sob volatile-lru seria evictável → crash-loop do
# beat. `noeviction` torna isso IMPOSSÍVEL (se encher, o enqueue falha visível).
# Em PROD (devDatabase.enabled=false) use um Redis gerenciado noeviction+HA e
# aponte secrets.celeryBrokerUrl/celeryResultBackend p/ ele.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-control-data
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app: redis-control
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.devDatabase.redisControl.storage | default "1Gi" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-control
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app: redis-control
spec:
  replicas: 1
  strategy:
    type: Recreate          # PVC RWO: termina o pod antigo antes de subir o novo
  selector:
    matchLabels:
      app: redis-control
  template:
    metadata:
      labels:
        app: redis-control
        app.kubernetes.io/part-of: centralops
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis-control
          image: {{ .Values.devDatabase.redisControl.image | default .Values.devDatabase.redis.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - "redis-server"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--appendonly"
            - "yes"
            # noeviction: NUNCA evicta (protege broker + schedule/lock RedBeat +
            # result). Se encher, o enqueue falha VISÍVEL > perder o lock silencioso.
            - "--maxmemory"
            - "{{ .Values.devDatabase.redisControl.maxmemory | default "256mb" }}"
            - "--maxmemory-policy"
            - "{{ .Values.devDatabase.redisControl.maxmemoryPolicy | default "noeviction" }}"
            - "--auto-aof-rewrite-percentage"
            - "100"
            - "--auto-aof-rewrite-min-size"
            - "64mb"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "centralops.fullname" . }}-devdb
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          volumeMounts:
            - name: redis-control-storage
              mountPath: /data
      volumes:
        - name: redis-control-storage
          persistentVolumeClaim:
            claimName: redis-control-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis-control
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app: redis-control
spec:
  selector:
    app: redis-control
  ports:
    - port: 6379
      targetPort: 6379
---
# Credenciais do dev-DB (derivadas; troque via values em ambientes compartilhados).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "centralops.fullname" . }}-devdb
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.devDatabase.postgres.user | default "user" | quote }}
  POSTGRES_PASSWORD: {{ .Values.devDatabase.postgres.password | default "CHANGE_ME" | quote }}
  POSTGRES_DB: {{ .Values.devDatabase.postgres.db | default "db" | quote }}
  REDIS_PASSWORD: {{ .Values.devDatabase.redis.password | default "CHANGE_ME" | quote }}
{{- end }}
