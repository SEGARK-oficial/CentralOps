{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "centralops.serviceAccountName" . }}
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
# Nenhum workload do CentralOps fala com o api-server do k8s → não monta o token.
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
