apiVersion: v1
kind: Service
metadata:
  name: {{ include "centralops.fullname" . }}-api
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "centralops.fullname" . }}-api
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "centralops.fullname" . }}-api
