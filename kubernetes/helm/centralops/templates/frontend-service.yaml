apiVersion: v1
kind: Service
metadata:
  name: {{ include "centralops.fullname" . }}-frontend
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "centralops.fullname" . }}-frontend
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "centralops.fullname" . }}-frontend
