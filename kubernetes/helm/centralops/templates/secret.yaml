{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "centralops.fullname" . }}-secret
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
type: Opaque
# stringData → o k8s codifica em base64 no servidor; mantém o template legível e
# evita base64 manual. Em PRODUÇÃO prefira `existingSecret` (ExternalSecrets/Vault/SOPS).
stringData:
  APP_MASTER_KEY: {{ .Values.secrets.appMasterKey | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  CELERY_BROKER_URL: {{ .Values.secrets.celeryBrokerUrl | quote }}
  CELERY_RESULT_BACKEND: {{ .Values.secrets.celeryResultBackend | quote }}
  {{- with .Values.secrets.flowerBasicAuth }}
  FLOWER_BASIC_AUTH: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.licenseToken }}
  # Licença Enterprise . OPCIONAL e edition-NEUTRO: a verificação
  # offline do token vive no core Community (edition.py/licensing.py), então a
  # Community ignora um token quando não há pacote EE presente. Com a IMAGEM EE
  # (values.ee.yaml) + token válido, edition.current() faz o flip para Enterprise
  # em runtime (via TTL, sem restart). Nunca embutido na imagem.
  CENTRALOPS_LICENSE_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.dataPlane.kafka.sasl.username }}
  KAFKA_SASL_USERNAME: {{ . | quote }}
  {{- end }}
  {{- with .Values.dataPlane.kafka.sasl.password }}
  KAFKA_SASL_PASSWORD: {{ . | quote }}
  {{- end }}
{{- end }}
