        target:
          type: Utilization
          averageUtilization: {{ .Values.frontend.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}

{{- range $name, $worker := .Values.workers }}
{{- if and (kindIs "map" $worker) (hasKey $worker "replicaCount") (ne $name "beat") -}}
{{- if $.Values.workers.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "centralops.fullname" $ }}-worker-{{ $name }}
  labels:
    {{- include "centralops.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ include "centralops.fullname" $ }}-worker-{{ $name }}
    app.kubernetes.io/component: worker-{{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "centralops.fullname" $ }}-worker-{{ $name }}
  minReplicas: {{ $.Values.workers.autoscaling.minReplicas }}
  maxReplicas: {{ $.Values.workers.autoscaling.maxReplicas }}
  metrics:
    {{- if $.Values.workers.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.workers.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $.Values.workers.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $.Values.workers.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
