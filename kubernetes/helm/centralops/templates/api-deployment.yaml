apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "centralops.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "centralops.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "centralops.fullname" . }}-api
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "centralops.fullname" . }}-api
  template:
    metadata:
      labels:
        {{- include "centralops.labels" . | nindent 8 }}
        app.kubernetes.io/name: {{ include "centralops.fullname" . }}-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "centralops.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        runAsUser: {{ .Values.api.runAsUser }}
      containers:
        - name: api
          image: "{{ include "centralops.image" (dict "img" .Values.image "context" .) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/start-api.sh"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "centralops.fullname" . }}-config
            - secretRef:
                name: {{ if .Values.secrets.existingSecret }}{{ .Values.secrets.existingSecret }}{{ else }}{{ include "centralops.fullname" . }}-secret{{ end }}
          startupProbe:
            httpGet:
              path: {{ .Values.api.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.api.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.api.probes.startup.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.readiness.path }}
              port: http
            periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.readiness.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.liveness.timeoutSeconds }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if eq (include "centralops.licenseKeyring.enabled" .) "true" }}
            {{- include "centralops.licenseKeyring.volumeMount" . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if eq (include "centralops.licenseKeyring.enabled" .) "true" }}
        {{- include "centralops.licenseKeyring.volume" . | nindent 8 }}
        {{- end }}
